<!--index.html is typically the main page returned from a google search-->

<!DOCTYPE html> <!-- Indicates what version of html we're using to the website-->

<html lang = "en"> 

    <head> 
        <!-- Contains metadata about the website-->

        <meta charset="UTF-8"> 
        <!-- Tells the website to use UTF-8 encoding--> 

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Resizes the screen based on device dimensions and sets scale to 1-->

        <meta name="author" content="Isaac Nai">

        <meta name="description" content="Free tutoring for students">

        <title>Nai Tutors</title>   <!-- Tags + Content is known as an element eg. title element-->
        <!-- Title of the website-->

        <link rel="stylesheet" href="style.css">

        <!-- Linking font from google fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
         rel="stylesheet">  
    </head>

    <body>

        <header>
            <h1 class = "logo">Nai Tutors</h1>
            <!-- Headings create structure to the website,
              a hierarchy that should be able to form a contents page if you tried-->
            <!-- Make sure not to use different headings
              for visual purposes as you can change that with css-->
        </header>
        
        
        <main>
            <section>
                <h2>No one should be denied <br> the right to <span class = "highlight">learn</span> </h2>

                <p>
                    Providing free <strong>GCSE/A-level</strong> tutoring for low-income families 
                    <br> or individuals with extenuating circumstances.
                </p> 


                <a href="application.html" rel="noopener noreferrer"> 
                    Apply Now
                </a>

                <br> <!--Line break-->

                <hr> <!--Horizontal rule-->
                
            </section>
        </main>
    </body>
</html>
