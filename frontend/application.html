<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
         rel="stylesheet">
    <title>Apply!</title>
</head>
<body class = "application">

    <header>

        <nav class = "navbar">

                <a href = "index.html"><h1 class = "logo">Nai Tutors</h1></a>

                <div class = "navbar-links">
                    <a href = "#how-it-works"> How it works </a>
                    <a href = "log-in.html"> Log in </a>
                </div>
            </nav>
    </header>

    <main class = "option-page">

        <section class = "option-section">

            <div class = "card student">
                <img class="student-image" src="/frontend/images/Student Illustration.svg" alt="Illustration of Student Studying">
                <p>I'm a Student</p>
            </div>
            
            <div class = "divider"></div>

            <div class = "card parent">
                <img class="parent-image" src="/frontend/images/Parent Illustration.svg" alt="Illustration of a Parent taking kids to school">
                <p>I'm a Parent/Guardian</p>
            </div>


        </section>

        <section class = "student-form hidden">

            <form class = "form-grid">
                
                <div class = "side-content">
                    <h3>Learning a bit <br>more about you</h3>
                    <img src="/frontend/images/Student Studying Illustration.svg" alt="Student studying">
                    <p>Step 1 out of 5</p>
                </div>

                <div class = "form-group">
                    <label for ="fname">First Name</label>
                    <input type="text" id = "fname" name ="fname">
                </div>

                <div class = "form-group">
                    <label for ="lname">Last Name</label>
                    <input type="text" id = "lname" name ="lname">
                </div>

                <div class = "form-group">
                    <label for ="email">Email:</label>
                    <input type="email" id = "email" name ="email">
                </div>

                <div class = "form-group">
                    <label for ="tel">Phone Number:</label>
                    <input type="tel" id="tel" name="tel">
                </div>
                
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob">
                </div>
                
                <div class = "form-group full-width">       
                    <label for ="password">Password:</label>
                    <input type="password" id = "password" name ="password">
                </div>

                <div class="form-group full-width">
                    <button type="submit" class = "submit-btn">Sign Up!</button>
                </div>

            </form>
        </section>

    </main>
    
    <script src = "application.js"></script>
</body>
</html>
